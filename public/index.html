<!DOCTYPE html>
<html lang="tr">
<head>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <meta charset="UTF-8" />
  <title>descx.art</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <!-- İsteğe bağlı font (çalışmazsa serif'e düşer) -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* ========= Tema / Palet ========= */
    :root{
      --parchment:#f6efe1;       /* sayfa zemini (kırık beyaz) */
      --paper:#fffdf6;           /* iç kart zemini */
      --ink:#2b1d0e;             /* yazı (mürekkep) */
      --muted:#6b5641;           /* ikincil metin */
      --gold:#b38a3e;            /* pirinç kenarlıklar */
      --border:#d8c7a3;          /* açık kenarlık */
      --shadow:0 14px 40px rgba(0,0,0,.18);
      --radius:12px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; color:var(--ink);
      font-family: "Libre Baskerville", "Noto Sans Devanagari", Georgia, serif;
      background:
        radial-gradient(1200px 700px at 50% 0%, #f8f1e6 0%, #efe3cd 60%, #e6d5b5 100%),
        repeating-linear-gradient(10deg, #0000 0 24px, #00000006 24px 25px);
    }

    /* Dil seçici */
    .lang-switcher{
      position:absolute; top:16px; right:20px;
      display:flex; gap:4px; z-index:10;
    }
    .lang-btn{
      padding:4px 10px; font-size:12px; font-weight:700;
      border:1px solid var(--gold); border-radius:6px;
      background:#fffdf9; color:var(--muted); cursor:pointer;
      font-family: inherit;
    }
    .lang-btn:hover{ background:#fff7e9; }
    .lang-btn.active{
      background:linear-gradient(#e9d6a6,#d6b86a); color:#3a2a0d;
    }

    /* Ana çerçeve (Victorian çizgiler) */
    .frame{
      max-width: 980px; margin: 32px auto; padding: 28px;
      background: var(--parchment);
      border: 1px solid var(--gold);
      border-radius: 10px;
      box-shadow: var(--shadow);
      position: relative;
    }
    .frame::before, .frame::after{
      content:""; position:absolute; inset:10px;
      border: 3px double var(--gold);
      border-radius: 8px;
      pointer-events:none;
    }
    .title{
      text-align:center; margin: 0 0 18px; font-size: 28px; letter-spacing:.02em;
      font-variant: small-caps;
    }

    .grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr; /* sol form, sağ oda listesi */
      gap: 18px;
    }

    /* Kartlar */
    .card{
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: inset 0 0 0 1px #ffffff80;
      padding: 18px;
    }
    .card h3{
      margin: 0 0 12px; font-size: 18px;
      border-bottom: 1px solid var(--border); padding-bottom: 8px;
    }

    /* Form */
    label{display:block; font-size:14px; color:var(--muted); margin-bottom:6px}
    .input{
      width:100%; padding:12px 14px; border-radius:10px;
      border:1px solid var(--border); background:#fffdf9; color:var(--ink);
      font-size:16px; outline:none;
    }
    .input:focus{border-color:var(--gold); box-shadow:0 0 0 3px #b38a3e21}
    .btn{
      width:100%; padding:12px 14px; margin-top:10px;
      border-radius:10px; border:1px solid #8a6a2a;
      background: linear-gradient(#e9d6a6, #d6b86a);
      font-weight:700; cursor:pointer;
    }
    .btn:hover{filter:brightness(1.04)}

    /* Oda listesi */
    #roomList{display:flex; flex-direction:column; gap:10px}
    .room{
      display:flex; justify-content:space-between; align-items:center;
      padding:12px 14px; border:1px solid var(--border); border-radius:10px;
      background:#fffdf9; cursor:pointer; transition:transform .06s ease, background .2s;
    }
    .room:hover{transform:translateY(-1px); background:#fff7e9}
    .room .name{font-weight:700}
    .status{font-size:13px; color:var(--muted)}
    .dot{font-size:14px; margin-left:6px}

    /* Alt bilgi */
    .foot{margin-top:14px; text-align:center; font-size:13px; color:var(--muted)}
    @media (max-width: 960px){
      .grid{grid-template-columns:1fr}
    }
  </style>

  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <main class="frame">
    <div id="langHost"></div>
    <div style="text-align:center; margin-bottom:20px;">
  <img src="/logo.png" alt="descx.art logo" style="height:80px;">
</div>


    <section class="grid">
      <!-- Sol: Giriş formu -->
      <div class="card">
        <h3 data-i18n="lobby_join_heading">Odaya Katıl</h3>
        <div>
          <label for="name" data-i18n="lobby_username_label">Kullanıcı adınız</label>
          <input id="name" class="input" placeholder="ör. user1" data-i18n-ph="lobby_username_ph" />
        </div>
        <div style="margin-top:10px">
          <label for="room" data-i18n="lobby_room_label">Oda adı (yeni veya var olan)</label>
          <input id="room" class="input" placeholder="ör. TestRoom" data-i18n-ph="lobby_room_ph" />
        </div>
        <button id="joinBtn" class="btn" type="button" data-i18n="lobby_join_btn">Odaya Katıl</button>
      </div>

      <!-- Sağ: Oda listesi -->
      <div class="card">
        <h3 data-i18n="lobby_rooms_heading">Mevcut Odalar</h3>
        <div id="roomList"></div>
        <div class="foot" data-i18n="lobby_click_hint">Bir odaya tıklayarak katılabilirsiniz.</div>
      </div>
    </section>
  </main>

  <script type="module">
    import { t, LANG, applyI18n, createLangSwitcher } from './i18n.js';

    applyI18n();
    document.getElementById('langHost').appendChild(createLangSwitcher());

    /* ========== Socket bağlan ========== */
    const socket = io();

    /* ========== Yardımcılar ========== */
    function statusText(r){
      if (r.inGame) return t('status_playing');
      if (r.isWaiting) return t('status_waiting');
      if (r.isFull) return t('status_full');
      return t('status_ready');
    }
    function statusDot(r){
      if (r.inGame) return '🟢';
      if (r.isWaiting) return '🟡';
      if (r.isFull) return '🔴';
      return '🔵';
    }

    /* ========== Odaya katıl butonu ========== */
    const joinBtn = document.getElementById('joinBtn');
    const nameInput = document.getElementById('name');
    const roomInput = document.getElementById('room');

    function goToGame(room, name){
      const qs = new URLSearchParams({ room, name, lang: LANG });
      window.location.href = `/game.html?${qs.toString()}`;
    }

    joinBtn.addEventListener('click', () => {
      const name = (nameInput.value || '').trim();
      const room = (roomInput.value || '').trim();
      if (!name || !room) { alert(t('lobby_alert_missing')); return; }
      goToGame(room, name);
    });

    // Enter ile hızlı giriş
    [nameInput, roomInput].forEach(inp => inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') joinBtn.click();
    }));

    /* ========== Oda listesi ========== */
    const listEl = document.getElementById('roomList');

    function renderRooms(rooms){
      listEl.innerHTML = '';
      rooms.forEach(r => {
        const div = document.createElement('div');
        div.className = 'room';

        const left = document.createElement('div');
        left.innerHTML = `<span class="name"></span>
                          <span class="status"></span>`;
        left.querySelector('.name').textContent = r.name;
        left.querySelector('.status').textContent = '(' + t('status_players_count', r.userCount) + ')';

        const right = document.createElement('div');
        right.className = 'status';
        const label = document.createElement('span');
        label.textContent = statusText(r) + ' ';
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.textContent = statusDot(r);
        right.appendChild(label);
        right.appendChild(dot);

        div.appendChild(left);
        div.appendChild(right);

        div.onclick = () => {
          const name = (nameInput.value || '').trim() || prompt(t('lobby_prompt_username'));
          if (!name) return;
          nameInput.value = name;
          roomInput.value = r.name;
          goToGame(r.name, name);
        };

        listEl.appendChild(div);
      });
    }

    // İlk liste isteği
    socket.emit('getRooms');
    socket.on('roomList', renderRooms);
  </script>
</body>
</html>
