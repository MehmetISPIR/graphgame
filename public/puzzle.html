<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mathematical Art Puzzle — descx.art</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --parchment:#f6efe1;--paper:#fffdf6;--ink:#2b1d0e;--muted:#6b5641;
  --gold:#b38a3e;--border:#d8c7a3;--shadow:0 14px 40px rgba(0,0,0,.18);
}
*{box-sizing:border-box}
body{
  margin:0;padding:20px;min-height:100vh;color:var(--ink);
  font-family:"Libre Baskerville","Noto Sans Devanagari",Georgia,serif;
  background:
    radial-gradient(1200px 700px at 50% 0%,#f8f1e6 0%,#efe3cd 60%,#e6d5b5 100%),
    repeating-linear-gradient(10deg,#0000 0 24px,#00000006 24px 25px);
}

/* Dil seçici */
.lang-switcher{
  position:absolute; top:16px; right:20px;
  display:flex; gap:4px; z-index:10;
}
.lang-btn{
  padding:4px 10px; font-size:12px; font-weight:700;
  border:1px solid var(--gold); border-radius:6px;
  background:#fffdf9; color:var(--muted); cursor:pointer;
  font-family: inherit;
}
.lang-btn:hover{ background:#fff7e9; }
.lang-btn.active{
  background:linear-gradient(#e9d6a6,#d6b86a); color:#3a2a0d;
}
.frame{
  max-width:1200px;margin:28px auto;padding:20px;background:var(--parchment);
  border:1px solid var(--gold);border-radius:10px;box-shadow:var(--shadow);position:relative;
}
.frame::before{content:"";position:absolute;inset:10px;border:3px double var(--gold);border-radius:8px;pointer-events:none}
.game{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:inset 0 0 0 1px #ffffff80}

.header{text-align:center;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:16px}
.header h1{margin:0 0 10px;font-variant:small-caps;letter-spacing:.02em;font-size:24px}
.stats{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;color:var(--muted);font-weight:600;font-size:14px}
.stats strong{color:var(--ink);margin-left:4px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.card{position:relative;background:#fffdf9;border:1px solid var(--border);border-radius:12px;padding:12px}
.label{position:absolute;top:-12px;left:16px;background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:4px 10px;font-size:12px;color:var(--muted);font-weight:700}
canvas{display:block;width:100%;aspect-ratio:5/3;height:auto;background:#fffaf0;border:1px solid #d8c7a3;border-radius:10px}

.similarity{height:10px;background:#f1e6cb;border:1px solid var(--border);border-radius:6px;margin-top:8px;overflow:hidden}
.sim-fill{height:100%;width:0%;border-radius:6px;transition:width .4s ease,background .4s ease}

.section{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:14px;margin:12px 0;box-shadow:inset 0 0 0 1px #ffffff80}

.blocks{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:#f9f5ed;border:1px dashed var(--border);border-radius:10px;min-height:52px;cursor:pointer}
.blocks:empty::after{content:attr(data-empty);color:var(--muted);font-style:italic;font-size:13px}

.drop{display:flex;flex-wrap:wrap;gap:8px;align-items:center;min-height:52px;padding:12px;border:2px dashed var(--border);border-radius:10px;background:#fffdf9;cursor:pointer}
.drop:empty::after{content:attr(data-empty);color:var(--muted);font-style:italic;font-size:13px}

.block{
  padding:8px 12px;border-radius:8px;font:700 14px/1 'Courier New',monospace;
  cursor:pointer;user-select:none;border:1px solid #00000014;
  box-shadow:0 2px 4px #0000001f;transition:transform .12s,opacity .12s;
}
.block:hover{transform:translateY(-2px)}
.block:active{transform:scale(.95)}
.block.term{background:linear-gradient(135deg,#7b9b7b,#5e7b5e);color:#fff}
.block.operator{background:linear-gradient(135deg,#d4a574,#b8935f);color:var(--ink)}
.block.number{background:linear-gradient(135deg,#9b7b9b,#7b5e7b);color:#fff}
.block.comparison{background:linear-gradient(135deg,#7b9b9b,#5e7b7b);color:#fff}
.block.function{background:linear-gradient(135deg,#9b7b7b,#7b5e5e);color:#fff}
.block.bracket{background:linear-gradient(135deg,#8b8b7b,#6b6b5e);color:#fff}

.formula-display{
  margin-top:8px;padding:8px 12px;min-height:28px;
  font:14px 'Courier New',monospace;color:var(--muted);
  background:#f9f5ed;border:1px solid var(--border);border-radius:8px;
  transition:border-color .2s;
}
.formula-display.error{border-color:#c44;color:#a33}
.formula-display.valid{border-color:#6a6;color:#463}
.formula-display.needs-ineq{border-color:#c90;color:#964}

.controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
button{
  padding:10px 16px;border:1px solid #8a6a2a;border-radius:10px;cursor:pointer;
  background:linear-gradient(#e9d6a6,#d6b86a);color:#3a2a0d;font-weight:700;
  font-size:14px;transition:filter .1s;
}
button:hover{filter:brightness(1.04)}
button:active{filter:brightness(.96)}
button.secondary{background:linear-gradient(#efe3cd,#e0d0b0)}

.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
.box{background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.big{font-size:24px;font-weight:800;color:var(--gold)}
.hint-text{min-height:24px;color:var(--muted);font-style:italic;font-size:13px;margin-top:4px}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  padding:12px 24px;border-radius:10px;font-weight:700;font-size:14px;
  opacity:0;transition:all .3s ease;z-index:100;pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.success{background:#4a7c4a;color:#fff}
.toast.error{background:#8c3a3a;color:#fff}
.toast.info{background:#4a6a8c;color:#fff}

@keyframes goldPulse{0%{box-shadow:0 0 0 0 rgba(179,138,62,.6)}100%{box-shadow:0 0 24px 12px rgba(179,138,62,0)}}
.glow{animation:goldPulse .8s ease-out}

/* ===== Responsive ===== */
@media (max-width: 900px){
  body{ padding:12px; }
  .frame{ margin:12px auto; padding:14px; }
  .frame::before{ inset:6px; }
  .game{ padding:14px; }
  .grid{ grid-template-columns:1fr; gap:12px; margin:12px 0; }
  .lang-switcher{ top:10px; right:12px; }
}
@media (max-width: 600px){
  body{ padding:6px; }
  .frame{ margin:6px; padding:10px; border-radius:8px; }
  .frame::before{ inset:4px; border-width:2px; border-radius:6px; }
  .game{ padding:10px; border-radius:10px; }
  .header{ padding-bottom:8px; margin-bottom:12px; }
  .header h1{ font-size:18px; margin:0 0 6px; }
  .stats{ gap:8px; font-size:12px; }
  .card{ padding:8px; }
  .label{ font-size:11px; padding:3px 8px; top:-10px; left:12px; }
  .section{ padding:10px; margin:10px 0; border-radius:10px; }
  h4{ font-size:14px; margin:0 0 8px; }
  .blocks, .drop{ padding:8px; gap:6px; min-height:46px; }
  .block{ padding:6px 10px; font-size:13px; }
  .formula-display{ font-size:13px; padding:6px 10px; }
  .controls{ gap:6px; margin-top:10px; }
  button{ padding:8px 12px; font-size:13px; }
  .row{ grid-template-columns:1fr; gap:8px; }
  .box{ padding:10px; }
  .big{ font-size:20px; }
  .lang-switcher{ top:6px; right:8px; gap:2px; }
  .lang-btn{ padding:3px 7px; font-size:11px; }
  .toast{ bottom:12px; padding:10px 18px; font-size:13px; max-width:90vw; }
}
</style>
</head>
<body>
<main class="frame">
  <div id="langHost"></div>
  <div class="game">
    <div class="header">
      <h1>Mathematical Art Puzzle</h1>
      <div class="stats">
        <span><span data-i18n="puzzle_level">Seviye</span> <strong id="levelNum">1</strong></span>
        <span><span data-i18n="puzzle_similarity">Benzerlik</span> <strong id="simTxt">0</strong>%</span>
        <span><span data-i18n="puzzle_hint_count">İpucu</span> <strong id="hintCnt">3</strong></span>
        <span><span data-i18n="puzzle_total">Toplam</span> <strong id="totalTxt">0</strong></span>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <span class="label" data-i18n="puzzle_target">Hedef Şekil</span>
        <canvas id="cvTarget"></canvas>
      </div>
      <div class="card" id="userCard">
        <span class="label" data-i18n="puzzle_your_drawing">Senin Çizimin</span>
        <canvas id="cvUser"></canvas>
        <div class="similarity"><div id="simBar" class="sim-fill"></div></div>
      </div>
    </div>

    <div class="section">
      <h4 data-i18n="puzzle_pieces_heading">Yapboz Parçaları</h4>
      <div id="palette" class="blocks"></div>
    </div>

    <div class="section">
      <h4 data-i18n="puzzle_formula_area">Formül Oluşturma Alanı</h4>
      <div id="drop" class="drop"></div>
      <div id="formulaDisplay" class="formula-display"></div>
    </div>

    <div class="controls">
      <button class="secondary" id="btnClear" data-i18n="puzzle_btn_clear">Temizle</button>
      <button id="btnHint" data-i18n="puzzle_btn_hint">İpucu</button>
      <button class="secondary" id="btnShuffle" data-i18n="puzzle_btn_shuffle">Karıştır</button>
      <button id="btnCheck" data-i18n="puzzle_btn_check">Kontrol Et</button>
      <button id="btnNext" data-i18n="puzzle_btn_next">Sonraki</button>
    </div>

    <div class="row">
      <div class="box">
        <div data-i18n="puzzle_this_round">Bu Tur</div>
        <div id="scoreTxt" class="big">0</div>
      </div>
      <div class="box">
        <div data-i18n="puzzle_hint_label">İpucu</div>
        <div id="hintTxt" class="hint-text"></div>
      </div>
    </div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script type="module">
import { GraphEngine } from './engine.js';
import * as math from 'https://cdn.jsdelivr.net/npm/mathjs@11.11.0/+esm';
import { t, LANG, applyI18n, createLangSwitcher } from './i18n.js';

applyI18n();
document.getElementById('langHost').appendChild(createLangSwitcher());

/* ===================== Canvas & Engine ===================== */
const cvT = document.getElementById('cvTarget');
const cvU = document.getElementById('cvUser');
cvT.width = cvU.width = 600;
cvT.height = cvU.height = 360;
const engT = new GraphEngine(cvT, 35);
const engU = new GraphEngine(cvU, 35);

/* ===================== Shapes (zorluga gore) ===================== */
/* hint objesi: { tr, en, hi } — mevcut dile göre seçilir */
const SHAPES = [
  { f:"x^2 + y^2 < 9", diff:1, hint:{
    tr:"Daire denklemi: x^2 + y^2 < r^2",
    en:"Circle equation: x^2 + y^2 < r^2",
    hi:"वृत्त: x^2 + y^2 < r^2" } },
  { f:"y < x^2", diff:1, hint:{
    tr:"Basit parabol: y < x^2",
    en:"Simple parabola: y < x^2",
    hi:"साधारण परवलय: y < x^2" } },
  { f:"x^2/9 + y^2/4 < 1", diff:2, hint:{
    tr:"Elips: x^2/a^2 + y^2/b^2 < 1",
    en:"Ellipse: x^2/a^2 + y^2/b^2 < 1",
    hi:"दीर्घवृत्त: x^2/a^2 + y^2/b^2 < 1" } },
  { f:"x * y < 4", diff:2, hint:{
    tr:"Hiperbolik bölge: x * y < sayı",
    en:"Hyperbolic region: x * y < number",
    hi:"अतिपरवलयिक क्षेत्र: x * y < संख्या" } },
  { f:"x^2 - y^2 < 4", diff:2, hint:{
    tr:"Fark: x^2 - y^2",
    en:"Difference: x^2 - y^2",
    hi:"अंतर: x^2 - y^2" } },
  { f:"y < x^2 / 3", diff:2, hint:{
    tr:"Ölçekli parabol: bölme işareti kullan",
    en:"Scaled parabola: use division",
    hi:"मापित परवलय: भाग चिह्न का उपयोग करें" } },
  { f:"abs(x) + abs(y) < 3", diff:3, hint:{
    tr:"Elmas/karo: abs(x) + abs(y)",
    en:"Diamond: abs(x) + abs(y)",
    hi:"हीरा: abs(x) + abs(y)" } },
  { f:"y < sin(x * 2) + 2", diff:3, hint:{
    tr:"Dalga: sin fonksiyonu kullan",
    en:"Wave: use sin function",
    hi:"तरंग: sin फलन का उपयोग करें" } },
  { f:"sin(x) * cos(y) < 0.5", diff:3, hint:{
    tr:"Desen: sin ve cos çarpımıyla oluşur",
    en:"Pattern: product of sin and cos",
    hi:"पैटर्न: sin और cos का गुणनफल" } },
  { f:"(x^2 + y^2 - 4)^3 < x^2 * y^3", diff:4, hint:{
    tr:"Kalp: parantez ve yüksek üsler gerekir",
    en:"Heart: parentheses and high powers needed",
    hi:"हृदय: कोष्ठक और उच्च घात चाहिए" } },
];

function shapeHint(shape) {
  return (shape.hint && (shape.hint[LANG] || shape.hint.tr)) || '';
}

/* ===================== State ===================== */
let blockIdCounter = 0;
const state = {
  level: 1,
  total: 0,
  hints: 3,
  roundScore: 0,
  currentShape: null,
  targetCompiled: null,
  paletteBlocks: [],
  formulaBlocks: [],
};

/* ===================== DOM refs ===================== */
const el = id => document.getElementById(id);
const paletteEl = el('palette');
const dropEl = el('drop');
const formulaEl = el('formulaDisplay');

/* Boş alan placeholder metinlerini mevcut dile göre ayarla */
paletteEl.setAttribute('data-empty', t('puzzle_all_used'));
dropEl.setAttribute('data-empty', t('puzzle_click_blocks'));

/* ===================== Toast ===================== */
let toastTimer = null;
function toast(msg, type = 'info') {
  const t = el('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

/* ===================== Tokenizer ===================== */
function tokenize(formula) {
  const clean = formula.replace(/\s+/g, '');
  const re = /(?:sin|cos|abs|max|min|sqrt)\(|\d+\.?\d*|[xy]\^\d+|<=|>=|[+\-*/^<>()xy,]/g;
  const tokens = [];
  let m;
  while ((m = re.exec(clean)) !== null) tokens.push(m[0]);
  return tokens;
}

function classifyToken(t) {
  if (/^(?:sin|cos|abs|max|min|sqrt)\($/.test(t)) return 'function';
  if ('+-*/^'.includes(t)) return 'operator';
  if (/^[<>]=?$/.test(t)) return 'comparison';
  if (t === '(' || t === ')' || t === ',') return 'bracket';
  if (/^\d+\.?\d*$/.test(t)) return 'number';
  return 'term';
}

/* ===================== Block generation ===================== */
function makeBlock(value) {
  return { id: ++blockIdCounter, type: classifyToken(value), value };
}

function generateBlocks(formula, diff) {
  const tokens = tokenize(formula);
  const blocks = tokens.map(makeBlock);

  // Distractor havuzu
  const distractors = [
    '+', '-', '*', '/', 'x', 'y', 'x^2', 'y^2', '>', '<',
    '(', ')', '1', '2', '3', '5', '7',
  ];
  if (diff >= 3) distractors.push('sin(', 'cos(', 'abs(');

  const count = Math.min(2 + diff, 6);
  const used = new Set(tokens);
  const pool = distractors.filter(d => !used.has(d));

  for (let i = 0; i < count && pool.length; i++) {
    const k = Math.floor(Math.random() * pool.length);
    blocks.push(makeBlock(pool.splice(k, 1)[0]));
  }

  // Karistir
  for (let i = blocks.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [blocks[i], blocks[j]] = [blocks[j], blocks[i]];
  }
  return blocks;
}

/* ===================== Render blocks ===================== */
function renderPalette() {
  paletteEl.innerHTML = '';
  state.paletteBlocks.forEach(b => {
    const d = document.createElement('div');
    d.className = `block ${b.type}`;
    d.textContent = b.value;
    d.dataset.id = b.id;
    d.addEventListener('click', () => moveToDrop(b.id));
    paletteEl.appendChild(d);
  });
}

function renderDrop() {
  dropEl.innerHTML = '';
  state.formulaBlocks.forEach(b => {
    const d = document.createElement('div');
    d.className = `block ${b.type}`;
    d.textContent = b.value;
    d.dataset.id = b.id;
    d.addEventListener('click', () => moveToPalette(b.id));
    dropEl.appendChild(d);
  });
  updateFormula();
}

/* ===================== Block movement ===================== */
function moveToDrop(blockId) {
  const idx = state.paletteBlocks.findIndex(b => b.id === blockId);
  if (idx === -1) return;
  const [block] = state.paletteBlocks.splice(idx, 1);
  state.formulaBlocks.push(block);
  renderPalette();
  renderDrop();
}

function moveToPalette(blockId) {
  const idx = state.formulaBlocks.findIndex(b => b.id === blockId);
  if (idx === -1) return;
  const [block] = state.formulaBlocks.splice(idx, 1);
  state.paletteBlocks.push(block);
  renderPalette();
  renderDrop();
}

function clearFormula() {
  state.paletteBlocks.push(...state.formulaBlocks);
  state.formulaBlocks = [];
  renderPalette();
  renderDrop();
}

/* ===================== Formula validation & rendering ===================== */
function getFormulaString() {
  return state.formulaBlocks.map(b => b.value).join(' ');
}

function validateFormula(expr) {
  if (!expr.trim()) return { valid: false, error: null };
  try {
    const compiled = math.compile(expr);
    const result = compiled.evaluate({ x: 1, y: 1 });
    if (typeof result === 'boolean') return { valid: true, compiled, isInequality: true };
    if (typeof result === 'number' && isFinite(result)) return { valid: true, compiled, isInequality: false };
    return { valid: false, error: t('puzzle_invalid_result') };
  } catch (e) {
    return { valid: false, error: e.message };
  }
}

function updateFormula() {
  const expr = getFormulaString();
  const v = validateFormula(expr);

  formulaEl.textContent = expr || ' ';
  formulaEl.className = 'formula-display';

  if (!expr.trim()) {
    renderUserCanvas(null);
    return;
  }

  if (!v.valid) {
    formulaEl.classList.add('error');
    renderUserCanvas(null);
    return;
  }

  if (!v.isInequality) {
    formulaEl.classList.add('needs-ineq');
    formulaEl.textContent = expr + '  (' + t('puzzle_needs_ineq') + ')';
    renderUserCanvas(null);
    return;
  }

  formulaEl.classList.add('valid');
  renderUserCanvas(v.compiled);
}

/* ===================== Canvas rendering ===================== */
function renderTargetCanvas() {
  if (!state.targetCompiled) { engT.render([]); return; }
  engT.render([{
    type: 'implicit', compiled: state.targetCompiled,
    xmin: -10, xmax: 10, dx: 0, dy: 0, theta: 0,
    color: '#5e7b5e', pointSize: 2
  }]);
}

function renderUserCanvas(compiled) {
  if (!compiled) { engU.render([]); updateSimilarity(0); return; }
  engU.render([{
    type: 'implicit', compiled,
    xmin: -10, xmax: 10, dx: 0, dy: 0, theta: 0,
    color: '#7b5e7b', pointSize: 2
  }]);
  const sim = computeSimilarity(state.targetCompiled, compiled);
  updateSimilarity(sim);
}

/* ===================== Similarity (fonksiyon bazli) ===================== */
function computeSimilarity(targetCompiled, userCompiled) {
  if (!targetCompiled || !userCompiled) return 0;
  const N = 70;
  const range = 10;
  let intersection = 0, union = 0;

  for (let i = 0; i < N; i++) {
    const x = -range + (2 * range * i) / (N - 1);
    for (let j = 0; j < N; j++) {
      const y = -range + (2 * range * j) / (N - 1);
      let t = false, u = false;
      try { t = targetCompiled.evaluate({ x, y }) === true; } catch {}
      try { u = userCompiled.evaluate({ x, y }) === true; } catch {}
      if (t || u) union++;
      if (t && u) intersection++;
    }
  }
  return union > 0 ? Math.round((intersection / union) * 100) : 0;
}

function updateSimilarity(pct) {
  el('simTxt').textContent = pct;
  const bar = el('simBar');
  bar.style.width = pct + '%';
  if (pct >= 85) bar.style.background = 'linear-gradient(90deg,#5a9a5a,#3a7a3a)';
  else if (pct >= 50) bar.style.background = 'linear-gradient(90deg,#d6b86a,#b38a3e)';
  else bar.style.background = 'linear-gradient(90deg,#c4a060,#a08040)';
}

/* ===================== Level management ===================== */
function shapesForLevel(level) {
  if (level <= 2) return SHAPES.filter(s => s.diff <= 1);
  if (level <= 5) return SHAPES.filter(s => s.diff <= 2);
  if (level <= 8) return SHAPES.filter(s => s.diff <= 3);
  return SHAPES;
}

function newLevel() {
  const pool = shapesForLevel(state.level);
  state.currentShape = pool[Math.floor(Math.random() * pool.length)];

  try {
    state.targetCompiled = math.compile(state.currentShape.f);
  } catch { return; }

  const allBlocks = generateBlocks(state.currentShape.f, state.currentShape.diff);
  state.paletteBlocks = allBlocks;
  state.formulaBlocks = [];
  state.roundScore = 0;

  el('levelNum').textContent = state.level;
  el('hintCnt').textContent = state.hints;
  el('hintTxt').textContent = '';
  el('scoreTxt').textContent = '0';

  renderPalette();
  renderDrop();
  renderTargetCanvas();
}

/* ===================== Check & scoring ===================== */
function checkAnswer() {
  const expr = getFormulaString();
  const v = validateFormula(expr);

  if (!v.valid || !v.isInequality) {
    toast(t('puzzle_invalid_formula'), 'error');
    return;
  }

  const sim = computeSimilarity(state.targetCompiled, v.compiled);
  updateSimilarity(sim);

  if (sim >= 85) {
    const score = Math.round(sim * state.currentShape.diff / 2);
    state.roundScore = score;
    state.total += score;
    el('scoreTxt').textContent = score;
    el('totalTxt').textContent = state.total;
    el('userCard').classList.add('glow');
    setTimeout(() => el('userCard').classList.remove('glow'), 800);
    toast(t('puzzle_great', score, sim), 'success');
  } else if (sim >= 50) {
    toast(t('puzzle_getting_close', sim), 'info');
  } else {
    toast(t('puzzle_keep_going', sim), 'info');
  }
}

/* ===================== Event listeners ===================== */
el('btnClear').addEventListener('click', clearFormula);

el('btnShuffle').addEventListener('click', () => {
  for (let i = state.paletteBlocks.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [state.paletteBlocks[i], state.paletteBlocks[j]] = [state.paletteBlocks[j], state.paletteBlocks[i]];
  }
  renderPalette();
});

el('btnHint').addEventListener('click', () => {
  if (state.hints <= 0) {
    toast(t('puzzle_no_hints'), 'error');
    return;
  }
  state.hints--;
  el('hintCnt').textContent = state.hints;
  el('hintTxt').textContent = shapeHint(state.currentShape);
  setTimeout(() => el('hintTxt').textContent = '', 5000);
});

el('btnCheck').addEventListener('click', checkAnswer);

el('btnNext').addEventListener('click', () => {
  state.level++;
  state.hints = 3;
  newLevel();
});

/* ===================== Init ===================== */
newLevel();
</script>
</body>
